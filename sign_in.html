<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in</title>
    <link rel="stylesheet" href="sign_in.css">
</head>

<body>

    <div class="inner-box">
        <h2>Welcome To your Store !</h2>
        <img class="logo-form" src="images/WhatsApp Image 2026-01-11 at 03.51.14.jpeg" width="100px" height="50px">
        <form>
            <div class="group">
                <label>Email:</label>
                <input type="numbers" placeholder="abc@gmail.com" required><br><br>
            </div>
            <div class="group">
                <label>Password:</label>
                <input type="password" placeholder="#&73oX4AZ" required><br><br>
            </div>
            <button type="submit">Login</button>
            <p class="signup">
                Don't Have a Account?
                <a href="#">Sign-Up</a>
            </p>
        </form>
    </div>
</body>
</html>
